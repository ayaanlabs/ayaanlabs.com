<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>

    .lime-glow { box-shadow: 0 0 28px 0 rgba(163,230,53,0.22), 0 0 0 1px rgba(163,230,53,0.18); }
    .lime-text-glow { text-shadow: 0 0 24px rgba(163,230,53,0.5); }
    .noise-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
    }
    .grid-bg {
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 56px 56px;
    }
    .card-hover-border { transition: border-color 0.35s ease, box-shadow 0.35s ease, transform 0.35s ease; }
    .card-hover-border:hover {
      border-color: rgba(163,230,53,0.45) !important;
      box-shadow: 0 0 36px 0 rgba(163,230,53,0.10), 0 8px 48px 0 rgba(0,0,0,0.6);

    .timeline-dot {
      width: 14px; height: 14px;

    .btn-primary {

      font-family: 'DM Sans', sans-serif;

    .btn-ghost:hover {
      border-color: rgba(163,230,53,0.4);

      background: rgba(163,230,53,0.04);
    }
    .nav-link {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem; font-weight: 400;
      color: rgba(255,255,255,0.55);

    }
    .nav-link:hover { color: #fafafa; }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .animate-pulse-glow { animation: pulse-glow 3s ease-in-out infinite; }

    .bento-radial {

      font-family: 'Syne', sans-serif;
      font-size: 1.05rem; font-weight: 700;
      cursor: pointer; text-decoration: none;
      transition: background 0.35s cubic-bezier(0.34,1.56,0.64,1), border-color 0.35s ease, color 0.35s ease, box-shadow 0.35s ease, transform 0.35s ease;
    }

      background: #a3e635;
      border-color: #a3e635;
      color: #09090b;
      box-shadow: 0 0 48px rgba(163,230,53,0.35), 0 8px 32px rgba(163,230,53,0.15);
      transform: translateY(-3px) scale(1.01);

</head>
<body>
  <div id="root"></div>
  <div class="noise-overlay"></div>

  <script type="text/babel">
    const { motion, useInView, useScroll, useTransform, AnimatePresence } = window.MotionGlobal || window.Motion || window.FramerMotion || (() => { throw new Error("Framer Motion not loaded"); })();
    const { useRef, useState, useEffect, useCallback } = React;
    const Icons = window.LucideReact || {};

    // ─── Utility ─────────────────────────────────────────────────────────────
    const cn = (...cls) => cls.filter(Boolean).join(' ');

    // ─── Animated Counter ─────────────────────────────────────────────────────
    function AnimatedNumber({ target, suffix = '', prefix = '' }) {
      const [count, setCount] = useState(0);
      const ref = useRef(null);
      const inView = useInView(ref, { once: true, margin: '-60px' });

      useEffect(() => {
        if (!inView) return;
        let start = 0;
        const end = parseInt(target.replace(/\D/g, ''));
        if (start === end) return;
        const duration = 1800;
        const step = (end - start) / (duration / 16);
        const timer = setInterval(() => {
          start = Math.min(start + step, end);
          setCount(Math.floor(start));
          if (Math.floor(start) >= end) clearInterval(timer);
        }, 16);
        return () => clearInterval(timer);
      }, [inView, target]);

      return <span ref={ref}>{prefix}{count}{suffix}</span>;
    }

    // ─── Star Rating ──────────────────────────────────────────────────────────
    function StarRating({ rating }) {
      return (
        <div style={{ display: 'flex', gap: 2 }}>
          {[1,2,3,4,5].map(i => (
            <span key={i} style={{ color: i <= rating ? '#a3e635' : '#3f3f46', fontSize: 14 }}>★</span>
          ))}
        </div>
      );
    }

    // ─── Navigation ──────────────────────────────────────────────────────────
    function Navbar() {
      const [scrolled, setScrolled] = useState(false);
      const [mobileOpen, setMobileOpen] = useState(false);

      useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 12);
        window.addEventListener('scroll', fn, { passive: true });
        return () => window.removeEventListener('scroll', fn);
      }, []);

      return (
        <motion.header
          initial={{ y: -64, opacity: 0 }}
          animate={{ y: 0, opacity: 1 }}
          transition={{ type: 'spring', stiffness: 90, damping: 18, delay: 0.1 }}
          style={{
            position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
            background: scrolled ? 'rgba(9,9,11,0.82)' : 'rgba(9,9,11,0.55)',
            backdropFilter: 'blur(20px)',
            borderBottom: '1px solid rgba(255,255,255,0.05)',
            transition: 'background 0.4s ease',
          }}
        >
          <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 28px', height: 68, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>

            {/* Brand */}
            <a href="#" style={{ textDecoration: 'none', display: 'flex', flexDirection: 'column', lineHeight: 1.15 }}>
              <span style={{ fontFamily: 'Syne, sans-serif', fontWeight: 800, fontSize: '1.15rem', color: '#fafafa', letterSpacing: '-0.03em' }}>
                Ayaan Labs
              </span>
              <span style={{
                fontFamily: 'Space Mono, monospace', fontSize: '0.58rem',
                color: '#a3e635', letterSpacing: '0.04em', fontWeight: 400,
                textShadow: '0 0 12px rgba(163,230,53,0.5)',
              }}>
                (SMC-Private) Limited
              </span>
            </a>

            {/* Desktop Links */}
            <nav style={{ display: 'flex', alignItems: 'center', gap: 8 }} className="hide-mobile">
              {['Services', 'Timeline', 'Testimonials'].map(l => (
                <a key={l} href={`#${l.toLowerCase()}`} className="nav-link" style={{ padding: '8px 14px' }}>{l}</a>
              ))}
            </nav>

            {/* CTA */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <a href="mailto:contact@ayaanlabs.com" className="btn-primary" style={{ fontSize: '0.85rem', padding: '10px 22px' }}>
                <span>Launch Console</span>
                <span style={{ fontSize: 16 }}>↗</span>
              </a>
            </div>
          </div>
        </motion.header>
      );
    }

    // ─── Hero ─────────────────────────────────────────────────────────────────
    function Hero() {
      return (
        <section style={{

        >
          {/* Background glow */}
          <div style={{
            position: 'absolute', top: '18%', left: '-10%', width: 600, height: 600,

            pointerEvents: 'none', borderRadius: '50%',

          <div style={{
            position: 'absolute', bottom: '10%', right: '-8%', width: 400, height: 400,
            background: 'radial-gradient(circle, rgba(163,230,53,0.04) 0%, transparent 70%)',
            pointerEvents: 'none', borderRadius: '50%',
          }} />

          <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 28px', width: '100%' }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 72, alignItems: 'center' }}
              className="hero-grid">

              {/* Left Column */}
              <div>
                <motion.div
                  initial={{ opacity: 0, y: 18 }}
                  animate={{ opacity: 1, y: 0 }}
                  transition={{ type: 'spring', stiffness: 100, damping: 20, delay: 0.25 }}
                  style={{
                    display: 'inline-flex', alignItems: 'center', gap: 8,
                    background: 'rgba(163,230,53,0.07)',
                    border: '1px solid rgba(163,230,53,0.2)',
                    borderRadius: 999, padding: '6px 16px', marginBottom: 28,
                  }}
                >
                  <span style={{ width: 7, height: 7, borderRadius: '50%', background: '#a3e635', boxShadow: '0 0 8px #a3e635' }} className="animate-pulse-glow" />
                  <span style={{ fontFamily: 'Space Mono', fontSize: '0.7rem', color: '#a3e635', letterSpacing: '0.08em' }}>
                    INCORPORATED JUNE 1ST, 2026
                  </span>
                </motion.div>

                <motion.h1
                  initial={{ opacity: 0, y: 24 }}
                  animate={{ opacity: 1, y: 0 }}
                  transition={{ type: 'spring', stiffness: 90, damping: 18, delay: 0.4 }}
                  style={{
                    fontFamily: 'Syne, sans-serif', fontWeight: 800,
                    fontSize: 'clamp(2.6rem, 5vw, 4rem)',
                    lineHeight: 1.05, letterSpacing: '-0.04em',
                    color: '#fafafa', margin: '0 0 12px 0',
                  }}
                >
                  Building since<br />
                  <span style={{ color: '#a3e635' }} className="lime-text-glow">2021.</span>
                </motion.h1>

                <motion.h2
                  initial={{ opacity: 0, y: 24 }}
                  animate={{ opacity: 1, y: 0 }}
                  transition={{ type: 'spring', stiffness: 90, damping: 18, delay: 0.5 }}
                  style={{
                    fontFamily: 'Syne, sans-serif', fontWeight: 700,
                    fontSize: 'clamp(1.5rem, 3vw, 2.4rem)',
                    lineHeight: 1.1, letterSpacing: '-0.03em',
                    color: 'rgba(255,255,255,0.45)', margin: '0 0 28px 0',
                  }}
                >
                  Engineered for Scale<br />in 2026.
                </motion.h2>

                <motion.p
                  initial={{ opacity: 0, y: 18 }}
                  animate={{ opacity: 1, y: 0 }}
                  transition={{ type: 'spring', stiffness: 90, damping: 18, delay: 0.6 }}
                  style={{
                    fontFamily: 'DM Sans', fontWeight: 400, fontSize: '1.05rem',
                    color: 'rgba(255,255,255,0.45)', lineHeight: 1.75,
                    maxWidth: 460, margin: '0 0 40px 0',
                  }}
                >
                  Five years of underground excellence — 129 global clients, zero compromises.
                  On June 1st, 2026, Ayaan Labs officially incorporated as an SMC-Private Limited
                  entity, ready to deploy enterprise-grade architecture at global scale.
                </motion.p>

                <motion.div
                  initial={{ opacity: 0, y: 18 }}
                  animate={{ opacity: 1, y: 0 }}
                  transition={{ type: 'spring', stiffness: 90, damping: 18, delay: 0.72 }}
                  style={{ display: 'flex', alignItems: 'center', gap: 14, flexWrap: 'wrap' }}
                >
                  <HeroMailBtn />
                  <a href="#services" className="btn-ghost" style={{ textDecoration: 'none' }}>
                    Explore Services
                  </a>
                </motion.div>
              </div>

              {/* Right Column — abstract visual */}
              <motion.div
                initial={{ opacity: 0, x: 40 }}
                animate={{ opacity: 1, x: 0 }}
                transition={{ type: 'spring', stiffness: 70, damping: 20, delay: 0.55 }}
                style={{ display: 'flex', justifyContent: 'flex-end' }}
                className="hide-mobile"
              >
                <HeroVisual />
              </motion.div>
            </div>
          </div>

          <style>{`
            @media (max-width: 768px) {
              .hero-grid { grid-template-columns: 1fr !important; gap: 48px !important; }
              .hide-mobile { display: none !important; }
            }
          `}</style>
        </section>
      );
    }

    function HeroMailBtn() {
      const [hovered, setHovered] = useState(false);
      return (
        <a
          href="mailto:contact@ayaanlabs.com"
          className="btn-primary"
          style={{ textDecoration: 'none', position: 'relative', overflow: 'hidden' }}
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}
        >
          <span style={{ position: 'relative', zIndex: 1 }}>Start a Project</span>
          <motion.span
            animate={{ x: hovered ? 0 : -16, opacity: hovered ? 1 : 0 }}
            transition={{ type: 'spring', stiffness: 260, damping: 22 }}
            style={{ position: 'relative', zIndex: 1, fontSize: 18 }}

      );
    }

    function HeroVisual() {
      return (
        <div style={{ position: 'relative', width: 340, height: 340 }} className="animate-float">
          {/* Outer ring */}
          <div style={{
            position: 'absolute', inset: 0, borderRadius: '50%',
            border: '1px solid rgba(163,230,53,0.12)',
          }} />
          <div style={{
            position: 'absolute', inset: 24, borderRadius: '50%',
            border: '1px solid rgba(163,230,53,0.08)',
          }} />
          <div style={{
            position: 'absolute', inset: 56, borderRadius: '50%',
            border: '1px solid rgba(163,230,53,0.06)',
            background: 'rgba(163,230,53,0.02)',
          }} />
          {/* Center card */}
          <div style={{
            position: 'absolute', top: '50%', left: '50%',
            transform: 'translate(-50%, -50%)',
            width: 140, height: 140, borderRadius: 20,
            background: 'rgba(18,18,22,0.95)',
            border: '1px solid rgba(163,230,53,0.22)',
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            boxShadow: '0 0 48px rgba(163,230,53,0.15), 0 24px 64px rgba(0,0,0,0.6)',
          }}>
            <span style={{
              fontFamily: 'Syne, sans-serif', fontWeight: 800, fontSize: '2.5rem',
              color: '#a3e635', letterSpacing: '-0.05em', lineHeight: 1,
            }} className="lime-text-glow">AL</span>
            <span style={{ fontFamily: 'Space Mono', fontSize: '0.58rem', color: 'rgba(255,255,255,0.35)', letterSpacing: '0.08em', marginTop: 6 }}>EST. 2021</span>
          </div>
          {/* Orbit dots */}
          {[0,72,144,216,288].map((deg, i) => (
            <div key={i} style={{
              position: 'absolute',
              top: '50%', left: '50%',
              width: 8, height: 8, borderRadius: '50%',
              background: i === 0 ? '#a3e635' : 'rgba(163,230,53,0.3)',
              boxShadow: i === 0 ? '0 0 10px #a3e635' : 'none',
              transform: `rotate(${deg}deg) translateX(155px) translateY(-4px)`,
            }} />
          ))}
        </div>
      );
    }

    // ─── Trust Strip ──────────────────────────────────────────────────────────
    function TrustMatrix() {
      const stats = [
        { label: '5+ Years Trajectory', num: '5', suffix: '+', prefix: '', sublabel: 'of elite engineering' },
        { label: '129+ Verified Global Reviews', num: '129', suffix: '+', prefix: '', sublabel: 'verified global reviews' },
        { label: '4.8/5 Retained Rating', num: '4.8', suffix: '/5', prefix: '', sublabel: 'retained client rating' },
      ];

      return (
        <section style={{
          background: 'rgba(18,18,22,0.9)',
          borderTop: '1px solid rgba(255,255,255,0.05)',
          borderBottom: '1px solid rgba(255,255,255,0.05)',
          padding: '52px 0',
        }}>
          <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 28px' }}>
            <div style={{
              display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)',
              gap: 2, position: 'relative',
            }} className="trust-grid">
              {stats.map((s, i) => (
                <motion.div
                  key={i}
                  initial={{ opacity: 0, y: 20 }}
                  whileInView={{ opacity: 1, y: 0 }}
                  viewport={{ once: true, margin: '-40px' }}
                  transition={{ type: 'spring', stiffness: 100, damping: 20, delay: i * 0.12 }}
                  style={{
                    textAlign: 'center', padding: '32px 24px',
                    borderRight: i < 2 ? '1px solid rgba(255,255,255,0.05)' : 'none',
                  }}
                >
                  <div style={{
                    fontFamily: 'Syne, sans-serif', fontWeight: 800,
                    fontSize: 'clamp(2.2rem, 4vw, 3.2rem)',
                    color: '#a3e635', letterSpacing: '-0.05em', lineHeight: 1,
                  }} className="lime-text-glow">
                    <AnimatedNumber target={s.num} suffix={s.suffix} prefix={s.prefix} />
                  </div>
                  <div style={{ fontFamily: 'DM Sans', color: 'rgba(255,255,255,0.4)', fontSize: '0.875rem', marginTop: 8, letterSpacing: '0.01em' }}>
                    {s.sublabel}
                  </div>
                </motion.div>
              ))}
            </div>
          </div>
          <style>{`@media(max-width:640px){ .trust-grid { grid-template-columns: 1fr !important; } }`}</style>
        </section>
      );
    }

    // ─── Bento Grid Services ───────────────────────────────────────────────────
    function BentoCard({ children, style, className }) {
      const ref = useRef(null);
      const handleMouseMove = useCallback((e) => {
        const rect = ref.current?.getBoundingClientRect();
        if (!rect) return;
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        ref.current.style.setProperty('--mx', `${x}%`);
        ref.current.style.setProperty('--my', `${y}%`);
      }, []);

      return (
        <div
          ref={ref}
          className={cn('bento-card card-hover-border', className)}
          onMouseMove={handleMouseMove}
          style={{
            background: 'rgba(18,18,22,0.96)',
            border: '1px solid rgba(255,255,255,0.07)',
            borderRadius: 18, padding: 32, position: 'relative', overflow: 'hidden',
            ...style,
          }}
        >
          <div className="bento-radial" />
          {children}
        </div>
      );
    }

    function Services() {
      return (
        <section id="services" style={{ padding: '100px 0', background: '#09090b' }}>
          <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 28px' }}>

            <motion.div
              initial={{ opacity: 0, y: 20 }}
              whileInView={{ opacity: 1, y: 0 }}
              viewport={{ once: true }}
              transition={{ type: 'spring', stiffness: 100, damping: 20 }}
              style={{ marginBottom: 56, maxWidth: 520 }}
            >
              <span style={{ fontFamily: 'Space Mono', fontSize: '0.7rem', color: '#a3e635', letterSpacing: '0.1em', display: 'block', marginBottom: 16 }}>
                CORE CAPABILITIES
              </span>
              <h2 style={{ fontFamily: 'Syne, sans-serif', fontWeight: 800, fontSize: 'clamp(2rem, 4vw, 2.9rem)', letterSpacing: '-0.04em', color: '#fafafa', margin: 0, lineHeight: 1.1 }}>
                Built for the <span style={{ color: '#a3e635' }}>hardest</span> problems.
              </h2>
            </motion.div>

            {/* Bento Grid */}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(12, 1fr)', gridTemplateRows: 'auto auto', gap: 16 }} className="bento-grid-layout">

              {/* Card 1 — Large */}
              <motion.div
                initial={{ opacity: 0, y: 24 }}
                whileInView={{ opacity: 1, y: 0 }}
                viewport={{ once: true, margin: '-40px' }}
                transition={{ type: 'spring', stiffness: 90, damping: 18, delay: 0 }}
                style={{ gridColumn: 'span 7' }}
                className="bento-full-mobile"
              >
                <BentoCard style={{ height: '100%', minHeight: 280 }}>
                  <div style={{ display: 'flex', flexDirection: 'column', height: '100%', justifyContent: 'space-between' }}>
                    <div>
                      <div style={{
